<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Price</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/predict">Predict Price</a>
            <a href="/market-trends">Market Trends</a>
            <a href="/about">About Us</a>
            <a href="/contact">Contact</a>
        </nav>
    </header>
    <main class="container">
        <h1>Predict Property Price</h1>
        <form id="predict-form">
            <div class="mb-3">
                <label for="location" class="form-label">Location</label>
                <input type="text" class="form-control" id="location" required>
            </div>
            <div class="mb-3">
                <label for="size" class="form-label">Size (sq ft)</label>
                <input type="number" class="form-control" id="size" required>
            </div>
            <div class="mb-3">
                <label for="bedrooms" class="form-label">Bedrooms</label>
                <input type="number" class="form-control" id="bedrooms" required>
            </div>
            <div class="mb-3">
                <label for="bathrooms" class="form-label">Bathrooms</label>
                <input type="number" class="form-control" id="bathrooms" required>
            </div>
            <button type="submit" class="btn btn-primary">Predict</button>
        </form>
        <div id="prediction-result" class="mt-3"></div>
    </main>
    <footer>
        &copy; 2023 Real Estate Insights
    </footer>
    <script>
        document.getElementById('predict-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            const location = document.getElementById('location').value;
            const size = parseFloat(document.getElementById('size').value);
            const bedrooms = parseInt(document.getElementById('bedrooms').value);
            const bathrooms = parseInt(document.getElementById('bathrooms').value);

            const response = await fetch('/api/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ location, size, bedrooms, bathrooms, price: 0 })
            });

            const result = await response.json();
            document.getElementById('prediction-result').innerText = `Predicted Price: $${result.predicted_price}`;
        });
    </script>
    <script src="/static/js/main.js"></script>
</body>
</html>
